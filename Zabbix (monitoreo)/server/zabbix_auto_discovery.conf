# ===========================================================================
# Configuración de descubrimiento automático de servicios
# ===========================================================================
# Este archivo define las reglas de descubrimiento automático
# que Zabbix utilizará para detectar y monitorizar servicios
# en la red sin intervención manual.
#
# Generado y gestionado por SaltStack.
# ===========================================================================

# --- Variables Jinja ---
{% set zabbix_discovery_network = salt['pillar.get']('zabbix:discovery_network', '192.168.0.0/24') %}
{% set zabbix_srv_ip = salt['pillar.get']('zabbix:server_ip', '192.168.0.11') %}

# ==========================================================================
UserParameter=network.discovery.services,sudo /usr/local/bin/zabbix_discover_services.sh "{{ zabbix_discovery_network }}" 2>/dev/null | tail -n +40 | head -n -5
UserParameter=net.tcp.discovery[*],for port in 21 22 25 53 80 443 3306 5432 6379 8000 8080 27017; do (echo >/dev/tcp/$1/$port) 2>/dev/null && echo "$port open" || true; done
UserParameter=service.available[*],(echo >/dev/tcp/$1/$2) 2>/dev/null && echo 1 || echo 0
UserParameter=service.type[*],if [ "$1" = "80" ] || [ "$1" = "443" ] || [ "$1" = "8080" ]; then echo "WebServer"; elif [ "$1" = "3306" ]; then echo "MySQL"; elif [ "$1" = "5432" ]; then echo "PostgreSQL"; elif [ "$1" = "22" ]; then echo "SSH"; elif [ "$1" = "21" ]; then echo "FTP"; elif [ "$1" = "25" ]; then echo "SMTP"; elif [ "$1" = "53" ]; then echo "DNS"; elif [ "$1" = "6379" ]; then echo "Redis"; elif [ "$1" = "27017" ]; then echo "MongoDB"; elif [ "$1" = "8000" ]; then echo "ResticREST"; else echo "Unknown"; fi
UserParameter=web.response.time[*],curl -sf -o /dev/null -w "%{time_total}" --max-time 5 http://$1:$2/ 2>/dev/null || echo -1
UserParameter=web.response.code[*],curl -sf -o /dev/null -w "%{http_code}" --max-time 5 http://$1:$2/ 2>/dev/null  || echo 0
UserParameter=mysql.ping[*],(echo >/dev/tcp/$1/$2) 2>/dev/null && echo 1 || echo 0
UserParameter=postgresql.ping[*],(echo >/dev/tcp/$1/$2) 2>/dev/null && echo 1 || echo 0
UserParameter=redis.ping[*],echo "PING" | nc -w 2 $1 $2 2>/dev/null | grep -c "+PONG"
UserParameter=mongodb.ping[*],(echo >/dev/tcp/$1/$2) 2>/dev/null && echo 1 || echo 0
UserParameter=ftp.ping[*],(echo >/dev/tcp/$1/$2) 2>/dev/null && echo 1 || echo 0
UserParameter=net.connections[*],ss -tn state established '( sport = :$1 or dport = :$1 )' 2>/dev/null | wc -l
UserParameter=net.ping.latency[*],ping -c 3 -W 2 $1 2>/dev/null | grep 'rtt' | cut -d'/' -f5 || echo -1

UserParameter=net.ping.loss[*],ping -c 10 -W 2 $1 2>/dev/null | grep 'loss' | awk '{print $6}' | tr -d '%' || echo -1
