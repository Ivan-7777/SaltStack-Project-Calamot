# ============================================================
# Configuración del Agente Zabbix Local - zabbix_agentd.conf
# ============================================================
# Este agente corre en el propio servidor Zabbix para que
# el servidor pueda monitorizarse a sí mismo (CPU, memoria,
# servicios, etc.).
#
# Generado y gestionado por SaltStack.
# ============================================================

# --- Variables Jinja (se renderiza como template independiente) ---
{% set zabbix_srv_ip     = salt['pillar.get']('zabbix:server_ip', '192.168.0.12') %}
{% set zabbix_agent_port = salt['pillar.get']('zabbix:agent_port', '10050') %}

# ----------------------------------------------------------
# Identidad del agente
# ----------------------------------------------------------

# Nombre único del host (debe coincidir con el "Host name"
# configurado en la interfaz web del servidor Zabbix)
Hostname=Zabbix Server

# ----------------------------------------------------------
# Conexión con el servidor Zabbix
# ----------------------------------------------------------

# Dirección IP del servidor Zabbix que puede pedir datos
# a este agente. Como el agente es local, apuntamos a
# la IP del propio servidor.
Server={{ zabbix_srv_ip }}

# Dirección del servidor para agente activo (envía datos
# sin esperar petición). Igual que Server en modo pasivo.
ServerActive={{ zabbix_srv_ip }}

# ----------------------------------------------------------
# Puerto de escucha
# ----------------------------------------------------------

# Puerto por defecto del agente Zabbix
ListenPort={{ zabbix_agent_port }}

# Escuchar en todas las interfaces
ListenIP=0.0.0.0

# ----------------------------------------------------------
# Logs
# ----------------------------------------------------------

# Archivo de log del agente
LogFile=/var/log/zabbix/zabbix_agentd.log

# Nivel de log (3 = warning, info por defecto)
DebugLevel=3

# Tamaño máximo del log (MB)
LogFileSize=10

# ----------------------------------------------------------
# Timeout
# ----------------------------------------------------------

# Timeout para comprobaciones locales (segundos)
Timeout=10

# ----------------------------------------------------------
# Permitir parámetros remotos
# ----------------------------------------------------------

# Si true, el servidor puede pedir al agente que ejecute
# comandos remotos. Desactivado por seguridad.
AllowRoot=0

# ----------------------------------------------------------
# Include de configuraciones adicionales
# ----------------------------------------------------------

# Directorio con archivos .conf adicionales (monitorización
# de servicios, scripts personalizados, etc.)
Include=/etc/zabbix/zabbix_agentd.d/*.conf

# ----------------------------------------------------------
# Fin de configuración
# ----------------------------------------------------------
