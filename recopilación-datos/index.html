<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Configuración de Infraestructura</title>
<style>
body { font-family: Arial; max-width:900px; margin:auto; }
fieldset { margin-bottom:20px; padding:15px; }
label { display:block; margin-top:8px; }
input, select { width:100%; padding:5px; margin-top:3px; }
</style>

<script>
function toggleSection(service, checkbox) {
    const section = document.getElementById(service + "-section");
    if (!section) return;
    section.style.display = checkbox.checked ? "block" : "none";
    const inputs = section.querySelectorAll("input, select, textarea");
    inputs.forEach(i => i.disabled = !checkbox.checked);
}

window.addEventListener("DOMContentLoaded", function() {
    const sections = ["wireguard", "firewall", "dhcp", "web", "pkica"];
    sections.forEach(s => {
        const section = document.getElementById(s + "-section");
        if (section) {
            const inputs = section.querySelectorAll("input, select, textarea");
            inputs.forEach(i => i.disabled = true);
        }
    });
});
</script>

</head>
<body>
<h1>Configuración de infraestructura</h1>

<form method="POST" action="recibir.php">

<fieldset>
<legend>Empresa</legend>
<label>
Nombre empresa
<input type="text" name="company" placeholder="Ejemplo: TecnoCorp">
</label>
</fieldset>

<fieldset>
<legend>Servicios a instalar</legend>
<label><input type="checkbox" name="services[]" value="wireguard" onchange="toggleSection('wireguard',this)"> WireGuard VPN</label>
<label><input type="checkbox" name="services[]" value="firewall" onchange="toggleSection('firewall',this)"> Firewall</label>
<label><input type="checkbox" name="services[]" value="dhcp" onchange="toggleSection('dhcp',this)"> Servidor DHCP</label>
<label><input type="checkbox" name="services[]" value="web" onchange="toggleSection('web',this)"> Web Server</label>
<label><input type="checkbox" name="services[]" value="pkica" onchange="toggleSection('pkica',this)"> PKI CA</label>
</fieldset>

<!-- WIREGUARD -->
<fieldset id="wireguard-section" style="display:none">
<legend>WireGuard</legend>
<label>Puerto VPN
<input type="number" name="wireguard[port]" placeholder="Ejemplo: 51830">
</label>
<label>Dirección VPN
<input type="text" name="wireguard[address]" placeholder="Ejemplo: 10.66.66.1/24">
</label>
<label>IP LAN servidor VPN
<input type="text" name="wireguard[static_lan_ip]" placeholder="Ejemplo: 192.168.0.10/24">
</label>
<label>Interfaz WAN
<select name="wireguard[wan_interface]">
<option value="">Seleccionar interfaz</option>
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>
</fieldset>

<!-- FIREWALL -->
<fieldset id="firewall-section" style="display:none">
<legend>Firewall</legend>
<h4>WAN</h4>
<label>IP
<input type="text" name="firewall[wan][ip]" placeholder="Ejemplo: 10.1.105.200">
</label>
<label>Máscara
<select name="firewall[wan][mask]">
<option value="24">24</option>
<option value="16">16</option>
</select>
</label>
<label>Gateway
<input type="text" name="firewall[wan][gateway]" placeholder="Ejemplo: 10.1.105.1">
</label>
<label>Interfaz WAN
<select name="firewall[wan][interface]">
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>

<h4>LAN</h4>
<label>IP
<input type="text" name="firewall[lan][ip]" placeholder="Ejemplo: 192.168.0.1">
</label>
<label>Máscara
<select name="firewall[lan][mask]">
<option value="24">24</option>
<option value="16">16</option>
</select>
</label>
<label>Interfaz LAN
<select name="firewall[lan][interface]">
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>

<h4>DMZ</h4>
<label>IP
<input type="text" name="firewall[dmz][ip]" placeholder="Ejemplo: 10.2.0.1">
</label>
<label>Máscara
<select name="firewall[dmz][mask]">
<option value="24">24</option>
<option value="16">16</option>
</select>
</label>
<label>Interfaz DMZ
<select name="firewall[dmz][interface]">
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>
</fieldset>

<!-- DHCP -->
<fieldset id="dhcp-section" style="display:none">
<legend>DHCP</legend>
<label><input type="checkbox" name="dhcp[log]" value="true"> Activar logging</label>

<h4>LAN</h4>
<label>Interfaz
<select name="dhcp[interfaces][lan][name]">
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>
<label>IP inicio
<input type="text" name="dhcp[interfaces][lan][range_start]" placeholder="Ejemplo: 192.168.0.50">
</label>
<label>IP fin
<input type="text" name="dhcp[interfaces][lan][range_end]" placeholder="Ejemplo: 192.168.0.200">
</label>
<label>Netmask
<select name="dhcp[interfaces][lan][netmask]">
<option value="255.255.255.0">255.255.255.0</option>
</select>
</label>
<label>Lease time
<input type="text" name="dhcp[interfaces][lan][lease_time]" placeholder="Ejemplo: 24h">
</label>

<h4>DMZ</h4>
<label>Interfaz
<select name="dhcp[interfaces][dmz][name]">
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>
<label>IP inicio
<input type="text" name="dhcp[interfaces][dmz][range_start]" placeholder="Ejemplo: 10.1.0.50">
</label>
<label>IP fin
<input type="text" name="dhcp[interfaces][dmz][range_end]" placeholder="Ejemplo: 10.1.255.200">
</label>
<label>Netmask
<select name="dhcp[interfaces][dmz][netmask]">
<option value="255.255.0.0">255.255.0.0</option>
</select>
</label>
<label>Lease time
<input type="text" name="dhcp[interfaces][dmz][lease_time]" placeholder="Ejemplo: 24h">
</label>

<h4>Opciones</h4>
<label>Gateways
<input type="text" name="dhcp[options][gateway]" placeholder="Ejemplo: 192.168.0.1,10.2.0.1">
</label>
<label>DNS
<input type="text" name="dhcp[options][dns]" placeholder="Ejemplo: 192.168.0.20">
</label>
</fieldset>

<!-- WEB SERVER -->
<fieldset id="web-section" style="display:none">
<legend>Web Server</legend>
<label>Dominio
<input type="text" name="web-server[domain]" placeholder="Ejemplo: server.es">
</label>
<label>Webroot
<input type="text" name="web-server[webroot]" placeholder="Ejemplo: /var/www/user/server/html">
</label>
<label>SSL Cert
<input type="text" name="web-server[ssl][cert]" placeholder="Ejemplo: server.crt">
</label>
<label>SSL Key
<input type="text" name="web-server[ssl][key]" placeholder="Ejemplo: server.key">
</label>
<label>Interfaz
<select name="web-server[network][interface]">
<option value="enp0s3">enp0s3</option>
<option value="enp0s8">enp0s8</option>
<option value="enp0s9">enp0s9</option>
</select>
</label>
<label>IP
<input type="text" name="web-server[network][address]" placeholder="Ejemplo: 192.168.0.20">
</label>
<label>Mask
<select name="web-server[network][mask]">
<option value="24">24</option>
<option value="16">16</option>
</select>
</label>
<label>Gateway
<input type="text" name="web-server[network][gateway]" placeholder="Ejemplo: 192.168.0.1">
</label>
<label>DNS
<input type="text" name="web-server[network][dns]" placeholder="Ejemplo: 192.168.0.1">
</label>
<label>SSH Port
<input type="number" name="web-server[ssh][port]" placeholder="Ejemplo: 22">
</label>
<label>Permit root login
<select name="web-server[ssh][permit_root_login]">
<option value="yes">yes</option>
<option value="no">no</option>
</select>
</label>
</fieldset>

<!-- PKI CA -->
<fieldset id="pkica-section" style="display:none">
<legend>PKI CA</legend>
<label>Base dir
<input type="text" name="pkica[base_dir]" placeholder="Ejemplo: /etc/pki/ca">
</label>
<label>Country
<input type="text" name="pkica[ca][country]" placeholder="Ejemplo: ES">
</label>
<label>State
<input type="text" name="pkica[ca][state]" placeholder="Ejemplo: Madrid">
</label>
<label>Locality
<input type="text" name="pkica[ca][locality]" placeholder="Ejemplo: Madrid">
</label>
<label>Organization
<input type="text" name="pkica[ca][organization]" placeholder="Ejemplo: MiOrg">
</label>
<label>Organizational Unit
<input type="text" name="pkica[ca][organizational_unit]" placeholder="Ejemplo: IT">
</label>
<label>Common Name
<input type="text" name="pkica[ca][common_name]" placeholder="Ejemplo: mi-ca">
</label>
<label>Días válidos
<input type="number" name="pkica[ca][days_valid]" placeholder="Ejemplo: 3650">
</label>
<label>Key Size
<input type="number" name="pkica[ca][key_size]" placeholder="Ejemplo: 4096">
</label>
<label>Digest
<input type="text" name="pkica[ca][digest]" placeholder="Ejemplo: sha256">
</label>
</fieldset>

<button type="submit">Guardar configuración</button>

</form>
</body>
</html>
