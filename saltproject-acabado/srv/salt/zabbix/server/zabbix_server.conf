# ============================================================
# Configuración del Servidor Zabbix - zabbix_server.conf
# ============================================================
# Este archivo define los parámetros del servidor Zabbix:
# conexión a MariaDB, hilos de recolección, alertas, etc.
#
# Generado y gestionado por SaltStack.
# No edite manualmente; use Pillar para cambiar valores.
# ============================================================

# --- Variables Jinja (se renderiza como template independiente) ---
{% set zabbix_db_host   = salt['pillar.get']('zabbix:db_host', '192.168.0.7') %}
{% set zabbix_db_port   = salt['pillar.get']('zabbix:db_port', '3306') %}
{% set zabbix_db_name   = salt['pillar.get']('zabbix:db_name', 'zabbix') %}
{% set zabbix_db_user   = salt['pillar.get']('zabbix:db_user', 'zabbix') %}
{% set zabbix_db_pass   = salt['pillar.get']('zabbix:db_pass', 'Z@bb1x_S3rv3r_2026!') %}

# ----------------------------------------------------------
# Parámetros generales del servidor
# ----------------------------------------------------------

# Dirección de escucha del servidor Zabbix (todas las interfaces)
ListenIP=0.0.0.0

# Puerto de escucha del servidor (10051 por defecto)
ListenPort=10051

# Nombre del servidor (aparece en la interfaz web)

# ----------------------------------------------------------
# Conexión a la base de datos MariaDB
# ----------------------------------------------------------
# La BD se encuentra en MINIONBDD (acceso remoto por TCP)

# Tipo de base de datos
DBHost={{ zabbix_db_host }}

# Puerto de MariaDB
DBPort={{ zabbix_db_port }}

# Nombre de la base de datos Zabbix
DBName={{ zabbix_db_name }}

# Usuario de BD con permisos sobre zabbix
DBUser={{ zabbix_db_user }}

# Contraseña del usuario (se gestiona desde Pillar)
DBPassword={{ zabbix_db_pass }}

# Tipo de base de datos (MySQL/MariaDB)
#DBSocket=

# ----------------------------------------------------------
# Hilos de recolección de datos (pollers)
# ----------------------------------------------------------
# Controlan cuántas conexiones simultáneas acepta el servidor
# con los agentes. Para infraestructura pequeña (2-5 hosts)
# con 5 hilos es suficiente.

# Hilos principales de recolección (agentes activos+pasivos)
StartPollers=5

# Hilos para comprobaciones ICMP/ping
StartPingers=2

# Hilos para comprobaciones de disponibilidad
StartTrappers=5

# Hilos para alertas y notificaciones
StartAlerters=3

# ----------------------------------------------------------
# Caché y rendimiento
# ----------------------------------------------------------

# Tamaño de la caché de configuración (en bytes, 8M por defecto)
CacheSize=64M

# Tamaño de la caché de historia (en bytes)
HistoryCacheSize=16M

# Tamaño de la caché de índices de historia
HistoryIndexCacheSize=4M

# Tamaño de la caché de tendencias
TrendCacheSize=4M

# Tamaño de la caché de valores (textos largos)
ValueCacheSize=4M

# ----------------------------------------------------------
# Logs
# ----------------------------------------------------------

# Archivo de log del servidor
LogFile=/var/log/zabbix/zabbix_server.log

# Nivel de log: 0=sin log, 1=critical, 2=error, 3=warning, 4=info, 5=debug
DebugLevel=3

# Tamaño máximo del archivo de log (MB), rota automáticamente
LogFileSize=10

# ----------------------------------------------------------
# Timeout y reintentos
# ----------------------------------------------------------

# Timeout máximo para respuestas de agentes (segundos)
Timeout=10

# ----------------------------------------------------------
# Fping (para comprobaciones ICMP)
# ----------------------------------------------------------
# Ruta al binario fping para pings a hosts
FpingLocation=/usr/bin/fping
Fping6Location=/usr/bin/fping6

# ----------------------------------------------------------
# Opciones avanzadas
# ----------------------------------------------------------

# Permitir ejecución de scripts personalizados en el servidor
# (desactivado por seguridad; se activa solo si se necesitan)
AllowRoot=0

# Usuario bajo el que corre el proceso (zabbix por defecto)
# (se gestiona automáticamente por el paquete Debian)

# ----------------------------------------------------------
# Fin de configuración
# ----------------------------------------------------------
