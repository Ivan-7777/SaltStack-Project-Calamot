# ============================================================
# Configuración del Agente Zabbix - zabbix_agentd.conf
# ============================================================

{% set zabbix_srv_ip     = salt["pillar.get"]("zabbix:server_ip", "192.168.0.4") %}
{% set zabbix_agent_port = salt["pillar.get"]("zabbix:agent_port", "10050") %}
{% set zabbix_hostname   = salt["grains.get"]("id") %}

Hostname={{ zabbix_hostname }}
# Permitimos tanto la IP del servidor como localhost para monitorización propia
Server=127.0.0.1,{{ zabbix_srv_ip }}
ServerActive={{ zabbix_srv_ip }}
ListenPort={{ zabbix_agent_port }}
ListenIP=0.0.0.0
LogFile=/var/log/zabbix/zabbix_agentd.log
DebugLevel=3
LogFileSize=10
Timeout=10
AllowRoot=0
Include=/etc/zabbix/zabbix_agentd.d/*.conf
