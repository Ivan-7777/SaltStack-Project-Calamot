#!/usr/sbin/nft -f
{% set lan_iface = salt['pillar.get']('wireguard:wan_interface', 'enp0s3') %}
{% set wg_addr = salt['pillar.get']('wireguard:address', '10.66.66.1/24') %}
{% set wg_ip = wg_addr.split('/')[0] %}
{% set wg_prefix = wg_addr.split('/')[1] if '/' in wg_addr else '24' %}
{% set wg_parts = wg_ip.split('.') %}
{% if wg_parts|length == 4 %}
{% set wg_net = wg_parts[0] ~ '.' ~ wg_parts[1] ~ '.' ~ wg_parts[2] ~ '.0/' ~ wg_prefix %}
{% else %}
{% set wg_net = '10.66.66.0/24' %}
{% endif %}

table inet filter {
    chain input {
        type filter hook input priority 0;
        policy accept;
    }

    chain forward {
        type filter hook forward priority 0;
        policy accept;
        iifname "wg0" oifname "{{ lan_iface }}" accept
        iifname "{{ lan_iface }}" oifname "wg0" ct state established,related accept
    }

    chain output {
        type filter hook output priority 0;
        policy accept;
    }
}

table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat;
        policy accept;
        ip saddr {{ wg_net }} oifname "{{ lan_iface }}" masquerade
    }
}
