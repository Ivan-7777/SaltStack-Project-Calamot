define WAN = "{{ pillar['firewall']['wan']['interface'] }}"
define LAN = "{{ pillar['firewall']['lan']['interface'] }}"
define DMZ = "{{ pillar['firewall']['dmz']['interface'] }}"
define WP = { 80, 443, 22 }
define DHCP = { 67, 68 }
define DNS = { 53 }
define SALT = { 4505, 4506 }

table inet filter {
    chain input {
        type filter hook input priority 0; policy drop;
        iifname $WAN ct state established accept
        iifname $LAN udp sport $DHCP accept
        iifname $LAN tcp sport $SALT accept
    }

    chain forward {
        type filter hook forward priority 0; policy drop;
        iifname $WAN accept
        oifname $WAN accept
        oifname $LAN ct state established accept
        iifname $DMZ tcp dport $WP accept
        iifname $LAN udp dport $DNS accept
        iifname $DMZ ct state established accept
        oifname $DMZ tcp dport $SALT accept

        {% if pillar[customer].get('wireguard') %}
        # Regla WireGuard
        oifname $WAN udp dport {{ pillar[customer]['wireguard']['port'] }} accept
        {% endif %}
    }

    chain output {
        type filter hook output priority 0; policy drop;
        oifname $LAN udp dport $DHCP accept
        oifname $WAN accept
        oifname $LAN tcp dport $SALT accept
    }
}

table inet nat {
    chain postrouting {
        type nat hook postrouting priority 100;
        oifname $WAN masquerade
    }
}
















